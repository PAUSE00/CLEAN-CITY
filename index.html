<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VillePropre - Système progressif interactif d'optimisation des tournées de collecte des déchets. Découvrez l'algorithme complet du graphe au modèle CVRP.">
  <meta name="theme-color" content="#05080f">
  <title>VillePropre — Optimisation Interactive des Déchets</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSIwLjllIiBmb250LXNpemU9IjkwIj7wn5qbPC90ZXh0Pjwvc3ZnPg==" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 20px;
    }
    
    .landing-card {
      background: var(--bg3);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 60px 50px;
      max-width: 800px;
      width: 100%;
      text-align: center;
      position: relative;
      box-shadow: var(--shadow-lg), 0 0 60px rgba(0, 240, 192, 0.05);
      animation: up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }
    
    @keyframes up {
      to { opacity: 1; transform: translateY(0); }
    }
    
    .landing-card::before {
      content: ''; position: absolute; top: -1px; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }
    
    .logo-hero {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 40px;
      box-shadow: 0 10px 30px rgba(0, 240, 192, 0.3), inset 0 2px 10px rgba(255,255,255,0.3);
      margin-bottom: 30px;
    }
    
    h1 {
      font-size: 52px; font-weight: 700; line-height: 1.1; letter-spacing: -1px;
      background: linear-gradient(135deg, #ffffff 20%, var(--accent) 70%, var(--accent2) 100%);
      background-clip: text; /* Fixed standard property */
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
      filter: drop-shadow(0 4px 20px rgba(0, 240, 192, 0.15));
    }
    
    .subtitle {
      color: var(--muted); font-size: 18px; max-width: 600px; margin: 0 auto 50px; font-weight: 400; line-height: 1.6;
    }
    
    .btn-group {
      display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px;
    }
    
    .btn-hero {
      padding: 16px 36px; border-radius: 16px; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: inline-flex; align-items: center; gap: 12px;
      text-decoration: none;
    }
    
    .btn-primary-hero {
      background: linear-gradient(135deg, var(--accent) 0%, #0ea5e9 100%);
      color: #030712;
      box-shadow: 0 10px 30px rgba(0, 240, 192, 0.3), inset 0 -3px 8px rgba(0,0,0,0.2);
    }
    .btn-primary-hero:hover { 
      transform: translateY(-4px) scale(1.03); 
      box-shadow: 0 15px 40px rgba(0, 240, 192, 0.5), inset 0 -3px 8px rgba(0,0,0,0.2); 
    }
    
    .btn-secondary-hero {
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff;
      backdrop-filter: blur(12px); box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
    .btn-secondary-hero:hover { 
      border-color: var(--accent); 
      background: rgba(0, 240, 192, 0.08);
      color: var(--accent); 
      box-shadow: 0 0 30px rgba(0, 240, 192, 0.2);
      transform: translateY(-4px);
    }
    .btn-icon { font-size: 20px; }
    
    .admin-link {
      font-size: 13px; color: var(--muted); text-decoration: none; 
      display: inline-flex; align-items: center; gap: 6px;
      transition: 0.2s; padding: 8px 16px; border-radius: 8px;
    }
    .admin-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
    
    @media (max-width: 768px) {
      h1 { font-size: 38px; }
      .landing-card { padding: 40px 30px; }
      .btn-group { flex-direction: column; }
      .btn-hero { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="landing-card">
    <div class="logo-hero">🚛</div>
    <h1>VillePropre</h1>
    <p class="subtitle">Système intelligent d'optimisation des tournées de collecte des déchets. Modélisation de graphes, heuristiques VRP et simulation IoT en temps réel.</p>
    
    <div class="btn-group">
      <a href="collecte_ui.html" class="btn-hero btn-primary-hero">
        <span class="btn-icon">📊</span> Lancer le Dashboard Live
      </a>
      <a href="apprendre_projet_enrichi.html" class="btn-hero btn-secondary-hero">
        <span class="btn-icon">🎓</span> Guide Interactif (Théorie)
      </a>
    </div>
    
    <a href="admin.html" class="admin-link">⚙️ Accéder au panneau d'administration</a>
  </div>

</body>
</html>
